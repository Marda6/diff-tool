<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENCY — Import / Merge postprocessor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0e1010; --panel:#303439; --inset:#1e2028; --fg:#f5f5f5; --g:#00a36d; --r:#ff6b6b; --rdim:rgba(255,107,107,.5); --grn:#3fcf8e; --ylw:#e3b341; --blu:#5aa9ff;
  --t80:rgba(245,245,245,.8); --t72:rgba(245,245,245,.72); --t56:rgba(245,245,245,.56); --t48:rgba(245,245,245,.48);
  --b24:rgba(245,245,245,.24); --b20:rgba(245,245,245,.2); --b16:rgba(245,245,245,.16);
  --b12:rgba(245,245,245,.12); --b8:rgba(245,245,245,.08); --b4:rgba(245,245,245,.04);
  --cols: minmax(0,1fr) 56px minmax(0,1fr);
  --radius:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#070808;color:var(--fg);font:400 12px/16px 'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.app{width:100%;max-width:1120px;height:780px;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--b24);border-radius:6px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.bar{display:flex;align-items:center;height:32px;padding:0 6px 0 10px;border-bottom:1px solid var(--b12);color:var(--t72);user-select:none}
.bar .wc{margin-left:auto;display:flex}
.bar .wc i{width:34px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--t56);font-size:15px}
.bar .wc i:hover{background:var(--b8);color:var(--fg)}
.tabsrow{display:flex;align-items:center;height:32px;padding:0 10px;border-bottom:1px solid var(--b12);gap:16px}
.tab{height:32px;display:flex;align-items:center;color:var(--t72);cursor:pointer;border-bottom:2px solid transparent}
.tab:hover{color:var(--fg)}
.tab.on{color:var(--fg);font-weight:600;border-bottom-color:var(--fg)}
.filters{margin-left:auto;display:flex;gap:2px}
.filters button{height:22px;padding:0 9px;background:transparent;border:1px solid transparent;border-radius:var(--radius);color:var(--t56);cursor:pointer;font:inherit}
.filters button:hover{color:var(--fg);background:var(--b8)}
.filters button.on{color:var(--fg);background:var(--b8);border-color:var(--b16)}
.filters .cnt{margin-left:5px;color:var(--t48);font-variant-numeric:tabular-nums}
.filters button.on .cnt{color:var(--t72)}
.filters .cnt:empty{display:none}
.main{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
.cname.ph{color:var(--t48)}
/* подсказка живёт В ЛЕВОЙ панели списка команд; низ левого (код) и правый current остаются как есть */
.lhint{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:24px;color:var(--t48)}
.lhint .et{font-size:13px;color:var(--t72)}
.lhint .es{font-size:12px;max-width:280px;line-height:16px}
.lhint .eb{margin-top:8px;height:26px;padding:0 12px;display:inline-flex;align-items:center;background:var(--b4);border:1px solid var(--b16);border-radius:var(--radius);color:var(--t80);cursor:pointer;font:inherit}
.lhint .eb:hover{background:var(--b12);color:var(--fg)}
.hdr{display:grid;grid-template-columns:var(--cols);border-bottom:1px solid var(--b12);height:32px;flex-shrink:0}
.hc.left{position:relative}
#impBtn{display:flex;align-items:center;justify-content:center;padding:4px;border:0;background:transparent;color:var(--t56);cursor:pointer;border-radius:var(--radius);font-size:15px}
#impBtn:hover{background:var(--b8);color:var(--fg)}
.combo{display:flex;align-items:center;gap:6px;flex:1;min-width:0;cursor:pointer;padding:3px 6px;border-radius:var(--radius)}
.combo:hover{background:var(--b8)}
.cpath{color:var(--t48);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1}
.cname{color:var(--t80);white-space:nowrap;flex-shrink:0}
.combo .ti-chevron-down{color:var(--t56);font-size:13px;flex-shrink:0;margin-left:auto}
.cmenu{position:absolute;z-index:20;background:#363b42;border:1px solid var(--b16);border-radius:6px;box-shadow:0 14px 36px rgba(0,0,0,.55);padding:4px;display:flex;flex-direction:column;gap:2px}
.cmenu[hidden]{display:none}
.cmenu .opt{display:flex;flex-direction:column;gap:1px;padding:5px 10px;border-radius:var(--radius);cursor:pointer}
.cmenu .opt:hover,.cmenu .opt.sel{background:var(--b8)}
.cmenu .oname{color:var(--t80)}
.cmenu .opath{color:var(--t48);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hc{display:flex;align-items:center;gap:8px;padding:4px 10px;color:var(--t56);font-size:11px;min-width:0}
.hc.mid{justify-content:center;padding:0;border-left:1px solid var(--b12);border-right:1px solid var(--b12)}
#mergeAll{width:100%;height:100%;border:0;background:transparent;color:var(--t56);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
#mergeAll:hover{background:var(--b8);color:var(--fg)}
.hlbl{white-space:nowrap}
.fld{flex:1;min-width:0;height:26px;display:flex;align-items:center;padding:0 8px;background:var(--b4);border:1px solid var(--b16);border-radius:var(--radius);color:var(--t72);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick{height:26px;width:28px;display:flex;align-items:center;justify-content:center;background:var(--b4);border:1px solid var(--b16);border-radius:var(--radius);color:var(--t72);cursor:pointer}
.pick:hover{background:var(--b12)}

/* zones = 3 synced panes (left | gutter | right) */
.zone{display:grid;grid-template-columns:var(--cols);min-height:0;background:var(--inset)}
#listZone{flex:1 1 auto}
#codeZone{flex:0 0 auto;height:260px;font:400 11px/17px 'JetBrains Mono',monospace;grid-template-columns:16px var(--cols) 16px}
.mmap{position:relative;overflow:hidden;border-right:1px solid var(--b12);cursor:pointer;background:var(--b4)}
.mmap.mmapr{border-right:0;border-left:1px solid var(--b12)}
.mtick{position:absolute;left:2px;right:2px;border-radius:1px}
.mtick.r{background:rgba(255,107,107,.4)}
.mtick.b{background:rgba(90,169,255,.42)}
.mtick.y{background:rgba(227,179,65,.42)}
.mview{position:absolute;left:0;right:0;background:rgba(245,245,245,.06);border-top:1px solid var(--b16);border-bottom:1px solid var(--b16);pointer-events:none}
.pane{min-width:0}
.lpane{overflow-y:auto;overflow-x:hidden;scrollbar-gutter:stable}
.rpane{overflow-y:auto;scrollbar-gutter:stable}
#listZone .rpane{overflow-x:hidden}
#codeZone .lpane,#codeZone .rpane{overflow:auto;scrollbar-gutter:stable}
.gpane{overflow-y:scroll;overflow-x:hidden;border-left:1px solid var(--b12);border-right:1px solid var(--b12);scrollbar-width:none}
.gpane::-webkit-scrollbar{display:none}

/* list rows */
#listZone .row{height:22px;display:flex;align-items:center;gap:8px;padding:0 10px;white-space:nowrap;overflow:hidden}
#listZone .lpane .row,#listZone .rpane .row{cursor:pointer}
#listZone .lpane .row:hover,#listZone .rpane .row:hover{background:var(--b4)}
#listZone .row.sel{background:var(--b8)}
#listZone .gpane .row{padding:0;display:flex;align-items:center;justify-content:center;gap:3px;position:relative}
.lmk{display:inline-flex;align-items:center;justify-content:center;color:var(--blu);font-size:13px}
.cb{width:14px;height:14px;flex-shrink:0;border:1px solid var(--b24);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--bg);background:transparent}
.cb.ck{background:var(--t72);border-color:var(--t72)}
.nm{overflow:hidden;text-overflow:ellipsis;color:var(--t80)}
.nm.d{color:var(--r)}
.nm.n{color:var(--grn)}
.nm.y{color:var(--ylw)}
.ladd{margin-left:auto;color:var(--t56);font-size:13px;flex-shrink:0}

/* code rows */
#codeZone .row{height:18px;line-height:18px;padding:0 10px;white-space:pre}
#codeZone .lpane .row{color:var(--t72);-webkit-user-select:text;user-select:text}
#codeZone .lpane .row,#codeZone .rpane .row{width:max-content;min-width:100%}   /* фон строки покрывает всю ширину при горизонтальном скролле */
#codeZone .rpane .row{color:var(--t72);outline:none}
#codeZone .rpane .row:focus{background:var(--b4)}
#codeZone .gpane .row{padding:0;display:flex;align-items:center;justify-content:center;gap:3px;position:relative}
.ed{position:absolute;top:0;bottom:1px;width:3px;background:var(--r)}
.ed.l{left:0}
.ed.r{right:0}
.ed.n{background:var(--grn)}
.ed.m{background:var(--blu)}
.ed.y{background:var(--ylw)}
.row.diffline{background:var(--b8)}
.row.mergedline{background:rgba(90,169,255,.12)}
.ch{background:rgba(255,107,107,.5);border-radius:2px;box-shadow:0 0 0 1px rgba(255,107,107,.9)}
.ch.y{background:rgba(227,179,65,.55);color:#1a1505;border-radius:2px;box-shadow:0 0 0 1px rgba(227,179,65,.95)}
.row.gap{background:var(--b4)}
.row.gap.del{background:rgba(227,179,65,.07)}
.codeplace{padding:16px;color:var(--t48);font-family:'Inter';display:flex;gap:8px}

.th{position:absolute;top:50%;height:1px;background:var(--b20)}
.th.full{left:0;right:0}
.th.toL{left:0;right:50%}
.th.toR{left:50%;right:0}
.mk{position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;background:var(--bg);color:var(--t72);font-size:13px;padding:0 3px}
.gbtn{width:calc(100% - 14px);height:16px;display:flex;align-items:center;justify-content:center;border:0;border-radius:var(--radius);background:transparent;color:var(--t72);cursor:pointer;font-size:13px;position:relative;z-index:1}
.gbtn:hover{background:var(--b8);color:var(--fg)}
.provdot{margin-left:auto;flex-shrink:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:0;padding:0}
.provdot::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--t48);transition:background .1s,box-shadow .1s}
.provdot:hover::before{background:var(--t80)}
.provdot.on::before{background:var(--blu);box-shadow:0 0 0 3px rgba(90,169,255,.3)}
#listR .row.provhit{background:rgba(90,169,255,.18);box-shadow:inset -2px 0 0 var(--blu)}

.split{height:7px;flex-shrink:0;cursor:row-resize;background:var(--b8);border-top:1px solid var(--b12);border-bottom:1px solid var(--b12);display:flex;align-items:center;justify-content:center}
.split::after{content:"";width:34px;height:2px;border-radius:2px;background:var(--b24)}
.split:hover{background:var(--b12)}
.foot{display:flex;align-items:center;gap:10px;height:42px;padding:0 12px;border-top:1px solid var(--b12)}
.foot .hint{display:inline-flex;align-items:center;gap:5px;color:var(--t48);font-size:11px;white-space:nowrap;padding-left:16px;border-left:1px solid var(--b12)}
.foot .hint .ti{font-size:13px}
.hinttoggle{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--b12);background:transparent;color:var(--t48);cursor:pointer;border-radius:var(--radius);font-size:14px}
.hinttoggle:hover{background:var(--b8);color:var(--fg)}
.counts{color:var(--t56);font-size:11px;display:flex;align-items:center;gap:16px;flex:1;min-width:0}
.legend{display:flex;align-items:center;gap:14px}
.legend .lg{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.legend .sw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend .sw.r{background:var(--r)}
.legend .sw.g{background:var(--grn)}
.legend .sw.b{background:var(--blu)}
.legend .sw.y{background:var(--ylw)}
.btns{margin-left:auto;display:flex;gap:8px}
.btn{height:24px;padding:0 14px;border-radius:var(--radius);border:1px solid var(--b16);background:var(--b4);color:var(--t72);cursor:pointer;font:inherit}
.btn:hover{background:var(--b12);color:var(--fg)}
.ctxmenu{position:fixed;z-index:60;min-width:210px;background:#363b42;border:1px solid var(--b16);border-radius:var(--radius);box-shadow:0 10px 30px rgba(0,0,0,.55);padding:4px;font-size:12px}
.ctxmenu .ci{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:3px;cursor:pointer;color:var(--t80);white-space:nowrap}
.ctxmenu .ci .ti{font-size:14px;color:var(--t56);flex-shrink:0}
.ctxmenu .ci:hover{background:var(--b8);color:var(--fg)}
.ctxmenu .ci:hover .ti{color:var(--fg)}
.ctxmenu .ci.dis{color:var(--t48);cursor:default}
.ctxmenu .ci.dis:hover{background:transparent;color:var(--t48)}
.ctxmenu .ci.dis .ti{color:var(--t48)}
.ctxmenu .cisep{height:1px;background:var(--b12);margin:4px 0}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--b16);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--b24)}
::-webkit-scrollbar-corner{background:transparent}
</style>
</head>
<body>
<div class="app">
  <div class="bar"><span id="winTitle">Import commands</span><span class="wc"><i class="ti ti-minus"></i><i class="ti ti-square"></i><i class="ti ti-x"></i></span></div>
  <div class="tabsrow" id="tabs">
    <span class="tab on" data-tab="cmd">Cmd</span>
    <span class="tab" data-tab="sub">Sub</span>
    <span class="tab" data-tab="obj">Objects</span>
    <span class="filters" id="filters">
      <button data-f="all" class="on">All<span class="cnt" id="cAll"></span></button>
      <button data-f="diff">Different<span class="cnt" id="cDiff"></span></button>
      <button data-f="new">New<span class="cnt" id="cNew"></span></button>
    </span>
  </div>
  <div class="main" id="mainArea">
    <div class="hdr">
      <div class="hc left">
        <div class="combo" id="postCombo"><span class="cpath" id="postPath"></span><span class="cname ph" id="impName">Select a postprocessor…</span><i class="ti ti-chevron-down"></i></div>
        <button id="impBtn" title="Import postprocessor from computer…"><i class="ti ti-dots"></i></button>
        <input type="file" id="impFile" accept=".sppx,.xml" hidden>
        <div class="cmenu" id="postMenu" hidden></div>
      </div>
      <div class="hc mid"><button id="mergeAll" title="Merge all to current"><i class="ti ti-chevrons-right"></i></button></div>
      <div class="hc right">To Current</div>
    </div>
    <div class="zone" id="listZone">
      <div class="pane lpane" id="listL"></div>
      <div class="pane gpane" id="listG"></div>
      <div class="pane rpane" id="listR"></div>
    </div>
    <div class="split" id="split"></div>
    <div class="zone" id="codeZone">
      <div class="mmap" id="codeMap"></div>
      <div class="pane lpane" id="codeL"></div>
      <div class="pane gpane" id="codeG"></div>
      <div class="pane rpane" id="codeR"></div>
      <div class="mmap mmapr" id="codeMapR"></div>
    </div>
  </div>
  <div class="foot">
    <button class="hinttoggle" id="hintToggle" title="Hide hints"><i class="ti ti-chevron-left"></i></button>
    <span class="counts" id="counts"></span>
    <span class="btns"><button class="btn">Cancel</button><button class="btn" id="okBtn">OK</button></span>
  </div>
</div>
<div class="ctxmenu" id="ctxMenu" hidden></div>
<script>
var DATA={"cmd":[{"name":"AbsMov","source":["program AbsMov","  if interp_=1 and G641_on_off = 1 then begin","    BlockN = BlockN + BlockStep","    output \"N\"+str(blockN)+\" G641 ADIS=\" + str(tolerance_look_ahead)","    G641_on_off = 10","  end","  call CheckAxesBrake(2, 2, 2)","","  if CycleOn = 0  or Cycle_pocket = 1 then begin    !Drugoj vyvod dlya sverlilnyx cziklov poziczij otverstij","    if (INTERP_ > 1) and (INTERP_ < 4) then INTERP_ = 1","    if PolarInterp = 1 then begin","      X = (cld[1]*csC - cld[2]*snC)","      Y = (cld[2]*csC + cld[1]*snC)","    end else begin","      X = cld[1]                      ! X,Y,Z in absolutes","      Y = cld[2]","    end;","    Z = cld[3]","    if (X<>X@) or (Y<>Y@) or (Z<>Z@) then","     OutBlock                     ! output in block NC programm","    XT_ = X;  YT_ = Y;  ZT_ = Z    ! current coordinates","  end","  XT_ = cld[1] ; YT_ = cld[2] ; ZT_ = cld[3]   !Zapominaem koordinaty otvertsij","  Cycle_pocket = 0  ! Vyklyuchaem metku dlya czikla poketov   ","end"],"current":["program AbsMov","  if interp_=2 and G641_on_off = 1 then begin","    BlockN = BlockN + BlockStep","    output \"N\"+str(blockN)+\" G641 ADIS=\" + str(tolerance_look_ahead)","  end","  call CheckAxesBrake(2, 2, 2)","","  if CycleOn = 0  or Cycle_pocket = 1 then begin    !Drugoj vyvod dlya sverlilnyx cziklov poziczij otverstij","    if (INTERP_ > 1) and (INTERP_ < 4) then INTERP_ = 1","    if PolarInterp = 1 then begin","      X = (cld[1]*csC - cld[2]*snC)","      Y = (cld[2]*csC + cld[1]*snC)","    end else begin","      X = cld[1]                      ! X,Y,Z in absolutes","      Y = cld[2]","    end;","    Z = cld[3]","    if (X<>X@) or (Y<>Y@) or (Z<>Z@) then","     OutBlock                     ! output in block NC programm","    XT_ = X;  YT_ = Y;  ZT_ = Z    ! current coordinates","  end","  XT_ = cld[1] ; YT_ = cld[2] ; ZT_ = cld[3]   !Zapominaem koordinaty otvertsij","  Cycle_pocket = 0  ! Vyklyuchaem metku dlya czikla poketov   ","end"]},{"name":"AxesBrake","source":["program AxesBrake","  ABrake: Integer","  BBrake: Integer","  CBrake: Integer","","  ABrake = -1","  BBrake = -1","  CBrake = -1","  if Cmd.Ptr[\"Axes(AxisAPos)\"]<>0 then begin","    ABrake = Cmd.Int[\"Axes(AxisAPos).BrakeState\"]","  end","  if Cmd.Ptr[\"Axes(AxisBPos)\"]<>0 then begin","    BBrake = Cmd.Int[\"Axes(AxisBPos).BrakeState\"]","  end","  if Cmd.Ptr[\"Axes(AxisCPos)\"]<>0 then begin","    CBrake = Cmd.Int[\"Axes(AxisCPos).BrakeState\"]","  end","  call CheckAxesBrake(ABrake, BBrake, CBrake)","end"],"current":["program AxesBrake","  ABrake: Integer","  BBrake: Integer","  CBrake: Integer","","  ABrake = -1","  BBrake = -1","  CBrake = -1","  if Cmd.Ptr[\"Axes(AxisAPos)\"]<>0 then begin","    ABrake = Cmd.Int[\"Axes(AxisAPos).BrakeState\"]","  end","  if Cmd.Ptr[\"Axes(AxisBPos)\"]<>0 then begin","    BBrake = Cmd.Int[\"Axes(AxisBPos).BrakeState\"]","  end","  if Cmd.Ptr[\"Axes(AxisCPos)\"]<>0 then begin","    CBrake = Cmd.Int[\"Axes(AxisCPos).BrakeState\"]","  end","  call CheckAxesBrake(ABrake, BBrake, CBrake)","end"]},{"name":"Circle","source":["program Circle","  if cld[4]*sgn(GPlane) > 0 then INTERP_ = 3","                            else INTERP_ = 2 ! G3/G2","  if PolarInterp = 1 then begin","    X = (cld[5]*csC - cld[6]*snC)","    Y = (cld[6]*csC + cld[5]*snC)","  end else begin","    X = cld[5]                              ! X,Y,Z in absolutes","    Y = cld[6]","  end;","","  X@=MaxReal ! X,Y,Z v absolyutax","  Y@=MaxReal","  Z = cld[7];      Z@=MaxReal","","  if (abs(GPlane)=17) and (ZT_=Z) then begin","    Z@=Z","  end else if (abs(GPlane)=18) and (YT_=Y) then begin","    Y@=Y","  end else if (abs(GPlane)=19) and (XT_=X) then begin","    X@=X","  end;","","  ! Esli spiral, to vyvodim Turn (kolichestvo oborotov) yavno","  if (abs(GPlane)=17) and (ZT_<>Z) then begin","    Turn = 0","    Turn@ = MaxReal","    if (XT_=X) and (YT_=Y) then","      Turn = 1  ! polnyj oborot","  end else if (abs(GPlane)=18) and (YT_<>Y) then ke(2, 2, 2)","","    for i = 1 to 30 do Prms[i] = MaxReal","    CycleNumber = 0","    CycleName = \"CYCLE\"","    CycleGeomName = \"\"","    case cld.SubType of","      473,481,482,","      483,484,485,","      486,487,488,","      489,490,491: begin ! 5D Drilling cycles","        ! Define current position","        case abs(GPlane) of","          17: begin ! XY","            CurPos = Z","            CPA = X","            CPO = Y","          end","          18: begin ! ZX","            CurPos = Y","            CPA = Z","            CPO = X","          end","          19: begin ! YZ","            CurPos = X","            CPA = Y","            CPO = Z","          end","          else begin","            print \"Undefined cycle plane\"","            CurPos = Z","            CPA = X","            CPO = Y","          end","        end","        if GPlane<0 then begin","          TempCoord = CPA","          CPA = CPO","          CPO = TempCoord","        end","        ! Define base levels","        RTP = CurPos","        RFP = CurPos - cld[7]*sgn(GPlane) ! CurPos - Tp","        SDIS = cld[7] - cld[6] ! Tp - Sf","        DP = CurPos - cld[8]*sgn(GPlane) ! CurPos - Bt","        DPR = cld[8] - cld[7] ! Bt - Tp","        ! CycleXX(RTP,RFP,SDIS,DP)","        Prms[1] = RTP","        Prms[2] = RFP","        Prms[3] = SDIS","        Prms[4] = DP","        CycleNumber = 81","        case cld.SubType of","          481,482,485,486,487,488,489: begin ! Simple drilling","            CycleNumber = cld.SubType - 400","            if cld[15]>0 then Prms[6] = cld[15] ! Delay in seconds","            ! Spindle rotation direction","            if S>0 then SDIR = 3","                   else SDIR = 4","            if (cld.SubType=486) or (cld.SubType=488) then","              Prms[7] = SDIR","            else if cld.SubType=487 then","              Prms[6] = SDIR","            if cld.SubType=485 then begin","              Prms[7] = cld[10] ! WorkFeed","              Prms[8] = cld[14] ! Retur function byName(a,b){return a.name.toLowerCase()<b.name.toLowerCase()?-1:1;}
function eq(a,b){ if(!a||!b) return false; if(a.length!==b.length) return false; for(var i=0;i<a.length;i++) if(a[i]!==b[i]) return false; return true; }
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function diffLines(A,B){
  var n=A.length,m=B.length,i,j; var dp=new Array(n+1); for(i=0;i<=n;i++){dp[i]=new Array(m+1).fill(0);}
  for(i=n-1;i>=0;i--)for(j=m-1;j>=0;j--){dp[i][j]=A[i]===B[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);}
  var raw=[];i=0;j=0;
  while(i<n&&j<m){ if(A[i]===B[j]){raw.push({op:'eq',a:A[i],b:B[j]});i++;j++;} else if(dp[i+1][j]>=dp[i][j+1]){raw.push({op:'del',a:A[i]});i++;} else {raw.push({op:'ins',b:B[j]});j++;} }
  while(i<n){raw.push({op:'del',a:A[i]});i++;}
  while(j<m){raw.push({op:'ins',b:B[j]});j++;}
  var out=[]; for(var k=0;k<raw.length;k++){ if(raw[k].op==='del'&&raw[k+1]&&raw[k+1].op==='ins'){out.push({op:'chg',a:raw[k].a,b:raw[k+1].b});k++;} else out.push(raw[k]); } return out;
}
function inlineDiff(srcStr,curStr,cls){
  var A=srcStr.split(''),B=curStr.split(''),n=A.length,m=B.length,i,j;
  var dp=new Array(n+1); for(i=0;i<=n;i++) dp[i]=new Array(m+1).fill(0);
  for(i=n-1;i>=0;i--)for(j=m-1;j>=0;j--){dp[i][j]=A[i]===B[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);}
  var lseg=[],rseg=[]; i=0;j=0;
  function push(arr,hl,ch){ var last=arr[arr.length-1]; if(last&&last.hl===hl) last.t+=ch; else arr.push({hl:hl,t:ch}); }
  while(i<n&&j<m){ if(A[i]===B[j]){push(lseg,false,A[i]);push(rseg,false,B[j]);i++;j++;}
    else if(dp[i+1][j]>=dp[i][j+1]){push(lseg,true,A[i]);i++;}
    else {push(rseg,true,B[j]);j++;} }
  while(i<n){push(lseg,true,A[i]);i++;}
  while(j<m){push(rseg,true,B[j]);j++;}
  function rend(segs){ return segs.map(function(s){var t=esc(s.t);return s.hl?'<span class="'+(cls||'ch')+'">'+t+'</span>':t;}).join(''); }
  return {l:rend(lseg),r:rend(rseg)};
}
function status(e){
  if(!e.source) return 'orphan';
  if(e.current==null) return 'add';
  if(e.edited) return 'edited';
  if(eq(e.current,e.source)) return e.merged?'merged':'ident';
  return e.merged?'partial':'diff';
}
function rightVisible(e){ return e.current!=null; }
function matchFilter(e){ var s=status(e);
  if(filter==='all') return true;
  if(filter==='diff') return s==='diff'||s==='edited'||s==='partial';
  if(filter==='new') return s==='add';
  if(filter==='merged') return s==='merged'||s==='ident';
  return true;
}
function statusMark(s){
  if(s==='ident')  return '<span class="th full"></span>';
  if(s==='merged') return '<span class="th full"></span><span class="mk"><i class="ti ti-check"></i></span>';
  if(s==='diff')   return '<span class="th full"></span><span class="mk">'+DIA+'</span>';
  if(s==='add')    return '<span class="th toL"></span><span class="mk"><i class="ti ti-arrow-right"></i></span>';
  if(s==='orphan') return '<span class="th toR"></span>';
  return '';
}

function editInfo(e){

  if(e.base==null) return info;
  var ops=diffLines(cur, e.base), ci=0;
  ops.forEach(function(o){
    if(o.op==='eq'){ ci++; }
    else if(o.op==='del'){ info.cur[ci]=true; ci++; }   // строка добавлена/набрана руками
    else if(o.op==='chg'){ info.cur[ci]=true; ci++; }   // строка изменена руками
    // ins: строка из base удалена руками — обрабатываем через baseHas ниже
  });

}

function applyAct(i){
  var ce=curEl(), se=srcEl(); if(!ce) return; var a=CURACTS[i]; if(!a) return;
  var srcArr = se?se.source:[];
  ce.current=readRight();
  if(isCross() && ce.base==null) ce.base=ce.current.slice();   // снимок ДО переноса (для построчного жёлтого)
  var ops=diffLines(ce.current||[], srcArr||[]); var ci=0, done=false;
  for(var k=0;k<ops.length && !done;k++){ var o=ops[k];
    if(o.op==='eq'){ci++;}
    else if(o.op==='del'){ci++;}
    else if(o.op==='chg'){ if(a.type==='chg'&&o.b===a.line){ ce.current[ci]=a.line; done=true; } ci++; }
    else if(o.op==='ins'){ if(a.type==='ins'&&o.b===a.line){ ce.current.splice(ci,0,a.line); done=true; } }
  }
  ce.touched=true; ce.merged=true; if(isCross()) ce.edited=true;  // код из ДРУГОЙ команды → метим как edited (жёлтый, вариант A)
  ce.mergedLines=ce.mergedLines||[]; if(a.line!=null) ce.mergedLines.push(a.line);
  if(isCross() && se && a.line!=null && !CROSS.some(function(c){return c.src===se.name&&c.line===a.line&&c.tgt===ce.name;})) CROSS.push({src:se.name,line:a.line,tgt:ce.name});  // провенанс: строка источника → цель
  renderCode(); renderList(); renderCounts();
}

function importLinesToCurrent(lineTexts){
  if(!lineTexts||!lineTexts.length) return;
  var ce=curEl(), se=srcEl(); if(!ce||!se) return; var src=se.source||[];
  ce.current=readRight();
  if(isCross() && ce.base==null) ce.base=ce.current.slice();
  var any=false;
  lineTexts.forEach(function(lt){
    var ops=diffLines(ce.current||[], src), ci=0, done=false;
    for(var k=0;k<ops.length && !done;k++){ var o=ops[k];
      if(o.op==='eq'){ci++;}
      else if(o.op==='del'){ci++;}
      else if(o.op==='chg'){ if(o.b===lt){ ce.current[ci]=lt; done=true; } ci++; }
      else if(o.op==='ins'){ if(o.b===lt){ ce.current.splice(ci,0,lt); done=true; } }
    }
    if(done){ any=true; ce.mergedLines=ce.mergedLines||[]; ce.mergedLines.push(lt);
      if(isCross() && !CROSS.some(function(c){return c.src===se.name&&c.line===lt&&c.tgt===ce.name;})) CROSS.push({src:se.name,line:lt,tgt:ce.name}); }
  });
  if(any){ ce.touched=true; ce.merged=true; if(isCross()) ce.edited=true; }
  renderCode(); renderList(); renderCounts();
}

function dataToSource(){ var o={}; ['cmd','sub','obj'].forEach(function(t){ o[t]=(DATA[t]||[]).filter(function(e){return e.source;}).map(function(e){return {name:e.name,code:e.source.slice()};}); }); return o; }
function deriveSource(base,seed){
  var tag=['Base','Fanuc','Heiden','Mazak','Lathe'][seed]||('V'+seed); var out={};
  ['cmd','sub','obj'].forEach(function(t){
    var res=[];
    (base[t]||[]).forEach(function(x,i){
      if((i*3+seed)%8===2) return;                       // у каждого поста свой набор команд (часть отсутствует)
      var code=x.code.slice();
      if(code.length>3 && (i+seed)%2===0){               // правим строку → появится chg-diff
        var li=1+((i*7+seed)%(code.length-1)); code[li]=code[li]+'    ; '+tag;
      }
      res.push({name:x.name,code:code});
    });
    if(t==='cmd') res.push({name:tag+'Init',code:['program '+tag+'Init','  ; уникально для '+tag,'  call CheckAxesBrake(0, 0, 0)','  ret']});  // команда только в этом посте
    out[t]=res;
  });
  return out;
}

function parseSppx(text){
  var doc; try{ doc=new DOMParser().parseFromString(text,'application/xml'); }catch(e){ return null; }
  if(!doc || doc.getElementsByTagName('parsererror').length) return null;
  function grab(tag){ var out=[]; Array.prototype.forEach.call(doc.getElementsByTagName(tag),function(el){
    var codeEl=el.getElementsByTagName('ProgramCode')[0]; if(!codeEl) return;
    var lines=codeEl.textContent.split(/\r?\n/);
    while(lines.length && lines[lines.length-1].trim()==='') lines.pop();
    while(lines.length && lines[0].trim()==='') lines.shift();
    var name=null; for(var i=0;i<lines.length;i++){ var m=lines[i].match(/^\s*(?:program|sub|object)\s+(\S+)/i); if(m){name=m[1];break;} }
    if(!name) return; out.push({name:name,code:lines});
  }); return out; }
  return { cmd:grab('Program'), sub:grab('Subroutine'), obj:grab('Object') };
}

    Object.keys(cur).forEach(function(nm){ if(!names[nm]) list.push({name:nm,source:null,current:cur[nm]}); });

  });
}
$('codeR').addEventListener('input',function(ev){ if(!ev.target.closest('.row')) return; var e=findSel(); if(!e) return; if(e.base==null) e.base=(e.current||[]).slice(); e.current=readRight(); e.touched=true; e.edited=true; renderList(); renderCounts(); });
// смещение каретки в символах внутри строки-ячейки
function caretOffsetIn(row){ var sel=window.getSelection(); if(!sel||!sel.rangeCount) return (row.textContent||'').length; var r=sel.getRangeAt(0).cloneRange(); r.selectNodeContents(row); try{ r.setEnd(sel.anchorNode, sel.anchorOffset); }catch(e){ return (row.textContent||'').length; } return r.toString().length; }
function placeCaret(row,off){ if(!row) return; row.focus(); var tn=row.firstChild; if(!tn||tn.nodeType!==3){ tn=document.createTextNode(''); row.insertBefore(tn,row.firstChild||null); } off=Math.max(0,Math.min(off,tn.length)); var sel=window.getSelection(); var rng=document.createRange(); rng.setStart(tn,off); rng.collapse(true); sel.removeAllRanges(); sel.addRange(rng); }
function focusCurLine(idx,off){ var rows=$('codeR').querySelectorAll('.row'); var c=0; for(var i=0;i<rows.length;i++){ if(rows[i].getAttribute('data-gap')==='1') continue; if(c===idx){ placeCaret(rows[i],off); return; } c++; } }
// Enter = реальная новая строка current (а не \n внутри ячейки): режем строку по каретке, перерисовываем, ставим каретку в новую строку
$('codeR').addEventListener('keydown',function(ev){
  if(ev.key!=='Enter') return;
  var sel=window.getSelection(); if(!sel||!sel.rangeCount) return;
  var node=sel.anchorNode; var row=(node.nodeType===3?node.parentElement:node).closest('.row');
  if(!row || row.getAttribute('data-gap')==='1') return;
  ev.preventDefault();
  var e=findSel(); if(!e) return; if(e.base==null) e.base=(e.current||[]).slice();
  var off=caretOffsetIn(row), text=row.textContent.replace(/ /g,' ');
  var before=text.slice(0,off), after=text.slice(off);
  var cur=[], newIdx=-1;
  Array.prototype.forEach.call($('codeR').querySelectorAll('.row'),function(r){
    if(r.getAttribute('data-gap')==='1') return;                    // read-only плейсхолдер — строки нет
    if(r===row){ cur.push(before); newIdx=cur.length; cur.push(after); }
    else cur.push(r.textContent.replace(/ /g,' '));
  });
  e.current=cur; e.touched=true; e.edited=true;
  renderCode(); renderList(); renderCounts();
  focusCurLine(newIdx,0);
});
$('codeZone').addEventListener('focusout',function(ev){ if(!$('codeZone').contains(ev.relatedTarget)) renderCode(); });
$('codeZone').addEventListener('contextmenu',function(e){ e.preventDefault(); showCtxMenu(e.clientX,e.clientY,selectedMergeLines(e.target.closest('.row'))); });
$('ctxMenu').addEventListener('click',function(e){ var ci=e.target.closest('.ci'); if(!ci) return; if(ci.classList.contains('dis')) return; var a=ci.getAttribute('data-act'); if(a==='merge') importLinesToCurrent(this._lines||[]); else if(a==='copy'){ try{document.execCommand('copy');}catch(_){} } this.hidden=true; });
document.addEventListener('click',function(e){ if(!e.target.closest('#ctxMenu')) $('ctxMenu').hidden=true; });
$('codeR').addEventListener('scroll',function(){ $('ctxMenu').hidden=true; });

$('tabs').addEventListener('click',function(e){ var t=e.target.closest('.tab'); if(!t) return; tab=t.dataset.tab; selL=null; selR=null; PROVON.length=0; Array.prototype.forEach.call(this.querySelectorAll('.tab'),function(c){c.classList.toggle('on',c===t);}); render(); });
$('filters').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b) return; filter=b.dataset.f; Array.prototype.forEach.call(this.children,function(c){c.classList.toggle('on',c===b);}); renderList(); renderCounts(); });
$('hintToggle').addEventListener('click',function(){ HINTS=!HINTS; this.querySelector('i').className='ti ti-chevron-'+(HINTS?'left':'right'); this.title=HINTS?'Hide hints':'Show hints'; renderCounts(); });
$('mergeAll').addEventListener('click',mergeAll);
$('impBtn').addEventListener('click',function(e){ e.stopPropagation(); $('impFile').click(); });
$('impFile').addEventListener('change',function(){ var f=this.files&&this.files[0]; this.value=''; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(){ var p=parseSppx(rd.result);
    if(!p || (!p.cmd.length && !p.sub.length && !p.obj.length)){ alert('Не удалось разобрать постпроцессор:\n'+f.name); return; }
    loadImport(p); POSTS.push({name:f.name,dir:'(импортирован с компьютера)',data:p}); curPost=POSTS.length-1; renderPost(); buildPostMenu(); render();
  };
  rd.readAsText(f);
});
$('postCombo').addEventListener('click',function(){ var m=$('postMenu'); if(!m.hidden){ m.hidden=true; return; } m.style.left=this.offsetLeft+'px'; m.style.width=this.offsetWidth+'px'; m.style.top=(this.offsetTop+this.offsetHeight+2)+'px'; m.hidden=false; });
$('postMenu').addEventListener('click',function(e){ var o=e.target.closest('.opt'); if(!o) return; var i=+o.getAttribute('data-i'); this.hidden=true; if(i===curPost) return; curPost=i; var p=POSTS[i]; if(p.data) loadImport(p.data); renderPost(); buildPostMenu(); render(); });
document.addEventListener('click',function(e){ if(!e.target.closest('#postCombo')&&!e.target.closest('#postMenu')) $('postMenu').hidden=true; });
$('okBtn').addEventListener('click',function(){ var a=items().filter(function(e){return status(e)==='merged';}); alert('Merged in this session: '+(a.length?a.map(function(e){return e.name;}).join(', '):'none')); });
(function(){ var codez=$('codeZone'), main=$('mainArea'), split=$('split'); var h=280;
  function setH(v){ h=Math.max(90, Math.min(v, main.clientHeight-150)); codez.style.height=h+'px'; }
  setH(h);
  split.addEventListener('mousedown',function(e){ e.preventDefault(); var sy=e.clientY, sh=h;
    function mv(ev){ setH(sh+(sy-ev.clientY)); drawCodeMap(); }
    function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
})();
renderPost(); buildPostMenu();
render();
</script>
